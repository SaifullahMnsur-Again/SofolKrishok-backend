name: Backend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Run the Django Test Suite
  # ─────────────────────────────────────────────
  test:
    name: Run Django Tests
    runs-on: ubuntu-latest

    services:
      # Spin up a real PostgreSQL database for testing
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: "ci-dummy-secret-key-not-for-production"
      DEBUG: "True"
      DATABASE_URL: "postgres://testuser:testpassword@localhost:5432/testdb"
      ALLOWED_HOSTS: "localhost,127.0.0.1,testserver"
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt psycopg2-binary

      - name: Run Django test suite
        run: python manage.py test --verbosity=2

  # ─────────────────────────────────────────────
  # JOB 2: Build & Push Docker Image
  # (Only runs on push to main, after tests pass)
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sofolkrishok-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sofolkrishok-backend:${{ github.sha }}

  # ─────────────────────────────────────────────
  # JOB 3: Deploy to DigitalOcean Droplet via SSH
  # (Only runs after the image is pushed)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: SSH into droplet and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            echo "Pulling latest backend image..."
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/sofolkrishok-backend:latest

            echo "Stopping old container..."
            docker stop sofolkrishok-backend || true
            docker rm sofolkrishok-backend || true

            echo "Starting new container..."
            docker run -d \
              --name sofolkrishok-backend \
              --restart always \
              -p 8000:8000 \
              --env-file /var/www/sofolkrishok/backend/.env \
              -v /var/www/sofolkrishok/backend/staticfiles:/app/staticfiles \
              -v /var/www/sofolkrishok/backend/media:/app/media \
              -v /var/www/sofolkrishok/backend/ml_models:/app/ml_models \
              ${{ secrets.DOCKERHUB_USERNAME }}/sofolkrishok-backend:latest

            echo "Cleaning up old images..."
            docker image prune -f

            echo "Backend deployed successfully!"
